# Defines the number of simultaneous connections per worker process.
events {
    worker_connections 1024;
}

http {
    # --- Rate Limiting ---
    # Tracks users by IP to prevent system abuse.
    # Limits each user to 10 requests per second.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --- Payload Configuration ---
    # Standard Nginx allows 1MB. We increase this to 10MB to allow
    # high-resolution tomato leaf photos to be uploaded without errors.
    client_max_body_size 10M;

    # --- Smart Load Balancing ---
    # Groups the 3 API replicas into a cluster.
    upstream tomato_api_cluster {
        # Using least_conn ensures that if one API is busy reading a 
        # large image from disk, the next request goes to a free replica.
        least_conn;
        
        # Points to the 'api' service defined in docker-compose.
        server api:8000;
    }

    server {
        # Gateway entry point on standard HTTP port.
        listen 80;

        # --- Dynamic Service Discovery ---
        # Connects to Docker's internal DNS (127.0.0.11).
        # Refreshes container IPs every 5 seconds to prevent 502 errors
        # during horizontal scaling or container restarts.
        resolver 127.0.0.11 valid=5s;

        location / {
            # Applies the 10r/s rate limit with a burst buffer of 20.
            limit_req zone=api_limit burst=20 nodelay;

            # --- Dynamic Routing ---
            # Using a variable forces Nginx to re-resolve the IP 
            # of the cluster for every request, ensuring high availability.
            proxy_pass http://tomato_api_cluster;

            # --- Proxy Headers ---
            # Forwards essential metadata so FastAPI knows the real client details.
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # --- Stability Timeouts ---
            # ResNet50 and EfficientNet inference can be slow on CPU.
            # 120s timeout prevents Nginx from closing the connection
            # while the background worker is processing the image.
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # --- Custom Error Handling ---
        # Returns a clean message when the rate limit is exceeded.
        error_page 429 = /limit_reached;
        location = /limit_reached {
            return 429 "Too many requests. Please wait a moment.";
        }
    }
}