events {
    worker_connections 1024;
}

http {
    # ---------------- Rate Limiting ----------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 🛡️ SENIOR ADDITION: Allow image uploads up to 10MB
    client_max_body_size 10M;

    server {
        listen 80;

        # 1. Internal Docker DNS (Crucial for fixing 502)
        # This tells Nginx to refresh the IP of 'api' every 5 seconds.
        resolver 127.0.0.11 valid=5s;

        location / {
            # 2. Rate Limiting
            limit_req zone=api_limit burst=20 nodelay;

            # 3. Dynamic Proxy (The "Senior" fix for 502)
            # By using a variable ($target), Nginx is forced to re-resolve 
            # the IP address instead of using a cached one from yesterday.
            set $target http://api:8000;
            proxy_pass $target;

            # 4. Standard Proxy Headers
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 5. BERT Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ---------------- Error Handling ----------------
        error_page 429 = /rate_limit;
        location = /rate_limit {
            return 429 "Too many requests. Please slow down.";
        }
    }
}